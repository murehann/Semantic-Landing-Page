<!DOCTYPE html>
<html>
    <head>
        <title>HTML Attributes</title>
    </head>
    <body>
        <!-- All html elements can have attributes, they provide additional info, and always specified in start tag, i.e. href attribute of <a> defines the url of the page the link goes to -->

        <!-- if url starts without slash it is relative to current document, and is with slash means relative to the domain -->

        <!-- style attribute to add style to an element -->

        <a href="https://www.w3schools.com" style="color: red; font-size: 20px;">W3Schools</a>
    </body>
</html>
