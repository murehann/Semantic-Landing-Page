<!DOCTYPE html>
<html lang="en">
<head>
    <title>HTML Elements</title>
</head>
<body>

    <!-- An HTML element is defined by a start tag, some content and an end tag. The HTML element is everything from the start tag to the end tag -->
    <h1>Heading</h1>

    <!-- HTML elements can be nested (this means that elements can contain other elements). 
    <html> is the root element, and defines the whole html document -->
    <p>This is <br> one para.</p>

    <!-- some tags dont have end tag i.e. img, video??  -->
    <img src="https://www.w3schools.com/images/img_2026_bootcamp_300.webp"  alt="">

    <!-- some tags dont have content inside it - called empty tag -->
    <br> 
    

</body>
</html>
