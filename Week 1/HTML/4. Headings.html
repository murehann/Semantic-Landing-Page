<!DOCTYPE html>
<html>
    <head>
        <title>HTML Headings</title>
    </head>

    <body>
        <!-- HTML headings are titles or subtitles that you want to display on a webpage.-->
        
        <!-- <h1> defines the most important heading. <h6> defines the least important heading. -->

        <!-- 
            <h1>page title</h1>
            <h2>section titles</h2>
            <h3>sub sections</h3>
        -->

        <h1>Travel Guide</h1>

        <h2>Europe</h2>
        <h3>France</h3>
        <h3>Italy</h3>

        <h2>Asia</h2>
        <h3>India</h3>
        <h3>Thailand</h3>
    </body>
</html>
