<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stripe | Financial Infrastructure to Grow Your Revenue</title>
</head>
<body>
  <header>
    <nav aria-label="Main navigation">
      <a href="/">Stripe</a>
      <ul>
        <li>
          <button aria-haspopup="true" aria-expanded="false" onclick="toggleMenu(this)" >Products</button>
          <ul role="menu" hidden>
            <li role="menuitem"> 
              <a href="#">Sub-item 1</a>
            </li>
            <li role="menuitem"> 
              <a href="#">Sub-item 2</a>
            </li>
          </ul>
        </li>
        <li>
          <button aria-haspopup="true" aria-expanded="false" onclick="toggleMenu(this)">Solutions</button>
          <ul role="menu" hidden>
            <li role="menuitem"> 
              <a href="#">Sub-item 1</a>
            </li>
            <li role="menuitem"> 
              <a href="#">Sub-item 2</a>
            </li>
          </ul>
        </li>
        <li>
          <button aria-haspopup="true" aria-expanded="false" onclick="toggleMenu(this)">Developers</button>
          <ul role="menu" hidden>
            <li role="menuitem"> 
              <a href="#">Sub-item 1</a>
            </li>
            <li role="menuitem"> 
              <a href="#">Sub-item 2</a>
            </li>
          </ul>
        </li>
        <li>
          <button aria-haspopup="true" aria-expanded="false" onclick="toggleMenu(this)">Resources</button>
          <ul role="menu" hidden>
            <li role="menuitem"> 
              <a href="#">Sub-item 1</a>
            </li>
            <li role="menuitem"> 
              <a href="#">Sub-item 2</a>
            </li>
          </ul>
        </li>
        <li>
          <a href="#">Pricing</a>
        </li>
      </ul>
      <div>
        <a href="#">Sign in</a>
        <a href="#">Contact Sales</a>
      </div>
    </nav>
  </header>

  <script>
  // Toggle menu function – only handles the clicked button
  function toggleMenu(button) {
    const nav = button.closest('nav');
    const menu = button.nextElementSibling;
    const isExpanded = button.getAttribute('aria-expanded') === 'true';

    // Close other buttons in the same nav
    nav.querySelectorAll('button[aria-haspopup="true"]').forEach(btn => {
      if (btn !== button) {
        btn.setAttribute('aria-expanded', 'false');
        btn.nextElementSibling.setAttribute('hidden', '');
      }
    });

    // Toggle current menu
    button.setAttribute('aria-expanded', String(!isExpanded));
    if (isExpanded) {
      menu.setAttribute('hidden', '');
    } else {
      menu.removeAttribute('hidden');
    }
  }

  // Global listener – collapses menus when focus leaves the nav
  document.addEventListener('focusin', (event) => {
    const nav = event.target.closest('nav[aria-label="Main navigation"]');
    if (!nav) return;

    nav.querySelectorAll('button[aria-haspopup="true"]').forEach(button => {
      const menu = button.nextElementSibling;
      if (!button.contains(event.target) && !menu.contains(event.target)) {
        button.setAttribute('aria-expanded', 'false');
        menu.setAttribute('hidden', '');
      }
    });
  });

  // Global listener – closes menu on Escape
  document.addEventListener('keydown', (event) => {
    if (event.key !== 'Escape') return;

    const nav = document.querySelector('nav[aria-label="Main navigation"]');
    if (!nav) return;

    const openButton = nav.querySelector('button[aria-expanded="true"]');
    if (openButton) {
      const menu = openButton.nextElementSibling;
      openButton.setAttribute('aria-expanded', 'false');
      menu.setAttribute('hidden', '');
      openButton.focus();
    }
  });
</script>
</body>
</html>
